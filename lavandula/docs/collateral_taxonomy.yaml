# Collateral Taxonomy — machine-readable source of truth for crawler keyword
# lists, signal weights, and tier assignments.
#
# Matching semantics: all filename_signals, anchor_signals, and path_keywords
# are matched as CASE-INSENSITIVE SUBSTRINGS, not regex patterns. Do not use
# regex metacharacters (.*+?[]()|\^$) — the validator rejects them.
#
# Companion human-readable reference: collateral_taxonomy.md

version: 1

thresholds:
  filename_score_accept: 0.8
  filename_score_reject: 0.15
  filename_score_weak_path_min: 0.5
  base_score: 0.5

signal_weights:
  strong_positive: 0.3
  medium_positive: 0.15
  strong_negative: -0.4
  medium_negative: -0.1
  year_bonus: 0.1

