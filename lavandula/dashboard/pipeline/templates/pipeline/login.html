<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8">
  <title>Login — Lavandula Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow p-8">
    <h1 class="text-xl font-bold text-gray-900 mb-6">Lavandula Pipeline</h1>
    {% if form.errors %}
    <div class="bg-red-100 text-red-800 p-3 rounded mb-4 text-sm">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" id="id_username" autofocus class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="mb-6">
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" id="id_password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Log in</button>
    </form>
  </div>
</body>
</html>
